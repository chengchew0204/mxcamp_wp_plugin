<!-- ================================================================
     OPTION 2: iframe Embed (Recommended for cross-domain)
     ================================================================
     
     Use this if you want to host the map on one domain and embed
     it on multiple different domains
     ================================================================ -->

<!-- wp:html -->
<div style="width: 100%; height: 100vh; position: relative;">
  <iframe 
    id="map-iframe"
    src="https://camp.mx/map-standalone/"
    style="width: 100%; height: 100%; border: none; display: block;"
    allowfullscreen
    loading="lazy">
  </iframe>
</div>

<script>
// Optional: Handle iframe communication for responsive height
window.addEventListener('message', function(event) {
  if (event.origin !== 'https://camp.mx') return;
  
  if (event.data.type === 'mapHeight') {
    const iframe = document.getElementById('map-iframe');
    if (iframe) {
      iframe.style.height = event.data.height + 'px';
    }
  }
});
</script>
<!-- /wp:html -->


<!-- ================================================================
     OPTION 3: Load from External HTML File
     ================================================================
     
     This loads the entire HTML structure from an external file
     Useful if you want to update the HTML structure independently
     ================================================================ -->

<!-- wp:html -->
<link rel="stylesheet" href="https://camp.mx/wp-content/uploads/map-component/map-component.css?v=1.0.0">

<div id="map-component-container"></div>

<script>
// Load the HTML structure from external file
fetch('https://camp.mx/wp-content/uploads/map-component/map-component.html?v=1.0.0')
  .then(response => response.text())
  .then(html => {
    document.getElementById('map-component-container').innerHTML = html;
    
    // Load the JavaScript after HTML is inserted
    const script = document.createElement('script');
    script.src = 'https://camp.mx/wp-content/uploads/map-component/map-component.js?v=1.0.0';
    document.body.appendChild(script);
  })
  .catch(error => {
    console.error('Failed to load map component:', error);
    document.getElementById('map-component-container').innerHTML = 
      '<p>Unable to load interactive map. Please try again later.</p>';
  });
</script>
<!-- /wp:html -->
